<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla de Carga</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.5s ease;
        }

        .spinner {
            border: 8px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        #content {
            display: none;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">El script se está cargando...</div>
    </div>

    <div id="content">
        <h1>¡Carga completada!</h1>
        <p>El contenido principal ya está disponible.</p>
    </div>

    <script>
        window.addEventListener('load', function() {
            // Simulamos un retraso para que se pueda apreciar la pantalla de carga
            setTimeout(function() {
                const loadingScreen = document.getElementById('loading-screen');
                const content = document.getElementById('content');
                
                loadingScreen.style.opacity = '0';
                
                setTimeout(function() {
                    loadingScreen.style.display = 'none';
                    content.style.display = 'block';
                }, 500);
            }, 3000); // 3 segundos de carga simulada
        });
    </script>
</body>
</html>
